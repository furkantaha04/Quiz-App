<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Quiz sorularını cevaplayın ve puanınızı görün.">
  <title>Quiz App — Sınav</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-container">
    <div class="user-bar" id="user-bar">
      <div class="user-bar-info">
        <div class="user-avatar" id="user-avatar">?</div>
        <span class="user-name" id="user-name">Yükleniyor...</span>
      </div>
      <div class="user-bar-actions">
        <a href="results.html" class="btn btn-secondary">Sıralama</a>
        <button class="btn btn-secondary" id="logout-btn">Çıkış</button>
      </div>
    </div>

    <!-- Lobby Screen -->
    <div id="lobby-screen" class="card" style="text-align:center;">
      <h2 class="card-title">⏳ Bekleme Salonu</h2>
      <p style="color:var(--text-secondary); margin-bottom:12px;">Quiz henüz başlamadı. Yöneticinin sınavı başlatmasını bekliyoruz...</p>
      <div style="background:var(--bg); border:1px solid var(--border); border-radius:12px; padding:16px; margin-bottom:24px;">
        <h3 style="font-size:1rem; margin-bottom:12px; color:var(--text); text-align:left;">👥 Odaya Katılanlar (<span id="lobby-count">0</span>)</h3>
        <div id="lobby-users" style="display:flex; flex-wrap:wrap; gap:8px; justify-content:center;">
          <!-- Kullanıcı etiketleri buraya eklenecek -->
          <span style="color:var(--text-muted); font-size:0.9rem;">Bağlanıyor...</span>
        </div>
      </div>
      <div class="spinner" style="margin:0 auto 10px; width:30px; height:30px; border-width:3px;"></div>
      <p style="color:var(--accent); font-weight:600; font-size:0.95rem;">Lütfen sayfadan ayrılmayın...</p>
    </div>

    <!-- Quiz Screen -->
    <div id="quiz-screen" style="display:none;">
      <div class="quiz-header">
        <div class="quiz-progress">
          <div class="quiz-progress-bar">
            <div class="quiz-progress-fill" id="progress-fill" style="width:0%"></div>
          </div>
          <span class="quiz-progress-text" id="progress-text">0/10</span>
        </div>
        <div class="quiz-score">Puan: <span id="score-display">0</span></div>
      </div>

      <div style="text-align:center; margin-bottom:12px;">
        <span style="font-size:1.5rem; font-weight:bold; color:var(--accent);" id="time-display">01:00</span>
      </div>

      <div class="card question-card fade-in" id="question-card">
        <div class="question-number" id="question-number">Soru 1</div>
        <div class="question-text" id="question-text">Yükleniyor...</div>
        <div class="options-list" id="options-list"></div>
      </div>

      <div style="text-align:center; margin-top:20px;">
        <button class="btn btn-primary" id="next-btn" style="display:none;">Sonraki Soru →</button>
      </div>
    </div>

    <!-- Loading -->
    <div id="loading-screen" class="loading-screen" style="display:none;">
      <div class="spinner" style="width:40px;height:40px;border-width:4px;"></div>
      <p>Sorular yükleniyor...</p>
    </div>
  </div>

  <script type="module" src="js/quiz.js"></script>
</body>
</html>
